<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALIENX Encryptor Decryptor</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at top,#153a30,#08110f 45%,#030303);

overflow:hidden;

}

/* Background Grid */

body::before{

content:"";

position:fixed;

inset:0;

background-image:

linear-gradient(rgba(0,255,150,.05) 1px,transparent 1px),
linear-gradient(90deg,rgba(0,255,150,.05) 1px,transparent 1px);

background-size:40px 40px;

animation:gridMove 15s linear infinite;

}

@keyframes gridMove{

0%{transform:translateY(0);}
100%{transform:translateY(40px);}

}

.card{

width:min(900px,92%);

padding:35px;

border-radius:22px;

background:rgba(20,20,20,.72);

backdrop-filter:blur(12px);

border:1px solid rgba(0,255,170,.18);

box-shadow:

0 0 30px rgba(0,255,150,.2),

0 0 60px rgba(0,255,150,.08);

position:relative;

z-index:2;

}

h1{

text-align:center;

color:#42ffb0;

font-size:30px;

letter-spacing:3px;

margin-bottom:8px;

text-shadow:0 0 15px #00ff99;

}

.subtitle{

text-align:center;

color:#8fdcc1;

margin-bottom:25px;

font-size:14px;

letter-spacing:1px;

}

textarea{

width:100%;

height:170px;

resize:vertical;

padding:18px;

border:none;

outline:none;

border-radius:15px;

background:#0b0f0d;

color:#61ffb6;

font-size:15px;

border:1px solid #1d5b46;

box-shadow:inset 0 0 15px rgba(0,255,150,.08);

}

textarea:focus{

border-color:#00ff99;

box-shadow:

0 0 18px rgba(0,255,150,.35),

inset 0 0 10px rgba(0,255,150,.15);

}

.buttons{

display:flex;

justify-content:center;

gap:18px;

margin:25px 0;

flex-wrap:wrap;

}

button{

padding:14px 45px;

border:none;

border-radius:40px;

cursor:pointer;

font-size:16px;

font-weight:bold;

letter-spacing:1px;

transition:.25s;

background:#00d47e;

color:#02140d;

box-shadow:0 0 20px rgba(0,255,150,.35);

}

button:hover{

transform:translateY(-3px);

background:#00ff99;

box-shadow:0 0 30px rgba(0,255,150,.65);

}

.footer{

margin-top:20px;

text-align:center;

font-size:12px;

color:#6ab79b;

}

@media(max-width:650px){

.card{

padding:20px;

}

h1{

font-size:22px;

}

textarea{

height:150px;

font-size:14px;

}

button{

width:100%;

}

}

</style>

</head>

<body>

<div class="card">

<h1>ALIENX</h1>

<div class="subtitle">

Encryptor & Decryptor

</div>

<textarea id="input" placeholder="Input..."></textarea>

<div class="buttons">

<button onclick="encryptText()">

Encrypt

</button>

<button onclick="decryptText()">

Decrypt

</button>

</div>

<textarea id="output" placeholder="Output..." readonly></textarea>

<div class="footer">

Powered By Anggarawsn 

</div>

</div>

<script>

const ENC_KEY = 23;

//=========================
// EncryptText
//=========================

function encryptText(){

let txt = document.getElementById("input").value.trim();

let hasil="";

for(let i=0;i<txt.length;i++){

hasil+=(txt.charCodeAt(i)^ENC_KEY)

.toString(16)

.toUpperCase()

.padStart(2,"0");

}

document.getElementById("output").value=hasil;

}

//=========================
// DecryptText
//=========================

function decryptText(){

let txt=document.getElementById("input").value.trim();

let hasil="";

for(let i=0;i<txt.length;i+=2){

hasil+=String.fromCharCode(

parseInt(txt.substr(i,2),16)^ENC_KEY

);

}

document.getElementById("output").value=hasil;

}

</script>

</body>
</html>
